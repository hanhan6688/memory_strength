<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Enhanced Memory System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .container { max-width: 1800px; margin: 0 auto; padding: 16px; }
        
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin-bottom: 12px;
        }
        h1 { font-size: 20px; }
        
        /* Agent Switcher */
        .agent-switcher { display: flex; gap: 6px; align-items: center; }
        .agent-btn {
            padding: 6px 14px; border-radius: 6px; cursor: pointer;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0; font-size: 12px; transition: all 0.2s;
        }
        .agent-btn:hover { background: rgba(255,255,255,0.1); }
        .agent-btn.active { 
            background: linear-gradient(135deg, #4fc3f7, #29b6f6); 
            color: #1a1a2e; border-color: transparent;
        }
        .agent-add {
            padding: 6px 10px; border-radius: 6px; cursor: pointer;
            background: rgba(129,199,132,0.2); border: 1px solid rgba(129,199,132,0.3);
            color: #81c784; font-size: 12px;
        }
        
        /* Stats */
        .stats { display: flex; gap: 16px; }
        .stat { text-align: center; }
        .stat-value { font-size: 22px; font-weight: bold; color: #4fc3f7; }
        .stat-label { font-size: 10px; color: #888; }
        
        /* Main Layout - 3 columns */
        .main-layout { display: grid; grid-template-columns: 260px 1fr 280px; gap: 12px; }
        
        /* Panel */
        .panel {
            background: rgba(255,255,255,0.03); border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column;
        }
        .panel-header {
            padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600; font-size: 13px;
        }
        
        /* Calendar */
        .calendar { padding: 10px; }
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .calendar-nav {
            cursor: pointer; padding: 3px 8px; border-radius: 4px;
            background: rgba(255,255,255,0.05); font-size: 12px;
        }
        .calendar-nav:hover { background: rgba(255,255,255,0.1); }
        .calendar-month { font-weight: 600; font-size: 13px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .calendar-day-header { text-align: center; font-size: 10px; color: #888; padding: 4px 0; }
        .calendar-day {
            text-align: center; padding: 6px 2px; font-size: 12px;
            border-radius: 4px; cursor: pointer; transition: all 0.2s; position: relative;
        }
        .calendar-day:hover { background: rgba(255,255,255,0.1); }
        .calendar-day.other-month { color: #444; }
        .calendar-day.today { background: rgba(129,199,132,0.2); color: #81c784; font-weight: 600; }
        .calendar-day.selected { background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
        .calendar-day.has-memory::after {
            content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
            width: 3px; height: 3px; border-radius: 50%; background: #4fc3f7;
        }
        
        /* Date List */
        .date-list { max-height: 200px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.08); }
        .date-item {
            padding: 8px 12px; cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px;
        }
        .date-item:hover { background: rgba(255,255,255,0.05); }
        .date-item.active { background: rgba(79,195,247,0.1); border-left: 2px solid #4fc3f7; }
        
        /* Memory List */
        .memory-panel { display: flex; flex-direction: column; max-height: calc(100vh - 160px); }
        .memory-list { flex: 1; overflow-y: auto; padding: 10px; }
        .memory-item {
            background: rgba(255,255,255,0.02); border-radius: 8px;
            padding: 10px 12px; margin-bottom: 6px;
            border-left: 2px solid #4fc3f7; transition: all 0.2s; font-size: 13px;
        }
        .memory-item:hover { background: rgba(255,255,255,0.05); }
        .memory-item.decision { border-left-color: #ce93d8; }
        .memory-item.event { border-left-color: #81c784; }
        .memory-item.learning { border-left-color: #ffb74d; }
        .memory-content { line-height: 1.5; margin-bottom: 4px; }
        .memory-meta { display: flex; gap: 8px; font-size: 10px; color: #888; }
        .type-badge { padding: 1px 8px; border-radius: 8px; font-size: 9px; font-weight: 600; }
        .type-badge.decision { background: rgba(206,147,216,0.2); color: #ce93d8; }
        .type-badge.event { background: rgba(129,199,132,0.2); color: #81c784; }
        .type-badge.context { background: rgba(79,195,247,0.2); color: #4fc3f7; }
        .type-badge.learning { background: rgba(255,183,77,0.2); color: #ffb74d; }
        
        /* Current Date Header */
        .current-date-header {
            padding: 8px 12px; background: rgba(79,195,247,0.1);
            border-radius: 6px; margin: 8px 10px 4px; text-align: center;
        }
        .current-date-value { font-size: 14px; font-weight: 600; color: #4fc3f7; }
        .current-date-count { font-size: 11px; color: #888; margin-top: 2px; }
        
        /* Add Memory */
        .add-memory { padding: 10px; border-top: 1px solid rgba(255,255,255,0.08); }
        .add-memory textarea {
            width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 12px; resize: none; height: 50px;
        }
        .add-memory textarea:focus { outline: none; border-color: #4fc3f7; }
        .add-row { display: flex; gap: 6px; margin-top: 6px; }
        .add-row select, .add-row input {
            flex: 1; padding: 5px 8px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 11px;
        }
        .add-row select option { background: #1a1a2e; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-primary { background: #4fc3f7; color: #1a1a2e; }
        
        /* Search */
        .search-box { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .search-box input {
            width: 100%; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 12px;
        }
        .search-box input:focus { outline: none; border-color: #4fc3f7; }
        
        /* Knowledge Graph Panel */
        .graph-panel { display: flex; flex-direction: column; }
        .entity-list { flex: 1; overflow-y: auto; padding: 10px; }
        .entity-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; background: rgba(255,255,255,0.02);
            border-radius: 6px; margin-bottom: 4px; cursor: pointer;
            transition: all 0.2s;
        }
        .entity-item:hover { background: rgba(255,255,255,0.05); }
        .entity-icon {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .entity-icon.tool { background: rgba(79,195,247,0.2); }
        .entity-icon.project { background: rgba(129,199,132,0.2); }
        .entity-icon.concept { background: rgba(206,147,216,0.2); }
        .entity-name { font-size: 12px; font-weight: 500; }
        .entity-meta { font-size: 10px; color: #888; }
        
        /* Entity Detail */
        .entity-detail {
            padding: 10px; border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }
        .entity-detail-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .relation-item {
            padding: 4px 0; font-size: 11px;
            display: flex; align-items: center; gap: 6px;
        }
        .relation-arrow { color: #4fc3f7; }
        
        /* Word Cloud */
        .word-cloud-container {
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .word-cloud-title {
            font-size: 12px; color: #888; margin-bottom: 8px;
        }
        #word-cloud {
            width: 100%; height: 180px; 
            background: rgba(0,0,0,0.2); border-radius: 8px;
            position: relative; overflow: hidden;
        }
        .word-item {
            position: absolute; cursor: pointer;
            transition: all 0.3s; font-weight: 600;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .word-item:hover {
            transform: scale(1.1);
            z-index: 10;
        }
        .word-tool { color: #4fc3f7; }
        .word-project { color: #81c784; }
        .word-concept { color: #ce93d8; }
        .word-person { color: #ffb74d; }
        
        /* Empty */
        .empty { text-align: center; padding: 30px 16px; color: #666; }
        .empty-icon { font-size: 32px; margin-bottom: 6px; opacity: 0.5; }
        
        /* Scrollbar */
        .memory-list::-webkit-scrollbar, .date-list::-webkit-scrollbar, .entity-list::-webkit-scrollbar { width: 3px; }
        .memory-list::-webkit-scrollbar-thumb, .date-list::-webkit-scrollbar-thumb, .entity-list::-webkit-scrollbar-thumb {
            background: rgba(79,195,247,0.3); border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Enhanced Memory</h1>
            
            <!-- Agent Switcher -->
            <div class="agent-switcher">
                <span style="font-size: 12px; color: #888;">Agent:</span>
                <div id="agent-buttons"></div>
                <button class="agent-add" onclick="addAgent()">+ 新建</button>
            </div>
            
            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">记忆</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-entities">0</div>
                    <div class="stat-label">实体</div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left: Calendar + Date List -->
            <div class="panel">
                <div class="panel-header">📅 选择日期</div>
                
                <!-- Calendar -->
                <div class="calendar">
                    <div class="calendar-header">
                        <span class="calendar-nav" onclick="prevMonth()">◀</span>
                        <span class="calendar-month" id="calendar-month">2026年3月</span>
                        <span class="calendar-nav" onclick="nextMonth()">▶</span>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                
                <!-- Date List -->
                <div class="date-list" id="date-list"></div>
            </div>

            <!-- Center: Memory List -->
            <div class="panel memory-panel">
                <div class="panel-header">
                    📝 <span id="current-agent-name">main</span> 的记忆
                </div>
                
                <!-- Search -->
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索记忆..." onkeypress="if(event.key==='Enter')searchMemories()">
                </div>
                
                <!-- Current Date Display -->
                <div class="current-date-header" id="date-header" style="display:none">
                    <div class="current-date-value" id="current-date-val"></div>
                    <div class="current-date-count" id="current-date-count"></div>
                </div>
                
                <!-- Memory List -->
                <div class="memory-list" id="memory-list">
                    <div class="empty"><div class="empty-icon">🧠</div>选择日期查看记忆</div>
                </div>
                
                <!-- Add Memory -->
                <div class="add-memory">
                    <textarea id="new-memory" placeholder="添加新记忆..."></textarea>
                    <div class="add-row">
                        <select id="mem-type">
                            <option value="context">💡 上下文</option>
                            <option value="event">📅 事件</option>
                            <option value="decision">🎯 决策</option>
                            <option value="learning">📚 学习</option>
                        </select>
                        <input type="number" id="mem-imp" value="0.5" min="0" max="1" step="0.1" placeholder="重要性">
                        <button class="btn btn-primary" onclick="addMemory()">添加</button>
                    </div>
                </div>
            </div>

            <!-- Right: Knowledge Graph -->
            <div class="panel graph-panel">
                <div class="panel-header">🕸️ 知识图谱</div>
                
                <!-- Word Cloud -->
                <div class="word-cloud-container">
                    <div class="word-cloud-title">实体词云图</div>
                    <div id="word-cloud"></div>
                </div>
                
                <!-- Entity Search -->
                <div class="search-box">
                    <input type="text" id="entity-search" placeholder="搜索实体..." onkeypress="if(event.key==='Enter')searchEntities()">
                </div>
                
                <!-- Entity List -->
                <div class="entity-list" id="entity-list">
                    <div class="empty"><div class="empty-icon">🔗</div>加载中...</div>
                </div>
                
                <!-- Entity Detail -->
                <div class="entity-detail" id="entity-detail" style="display:none">
                    <div class="entity-detail-title" id="entity-detail-title"></div>
                    <div id="entity-relations"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        const today = new Date().toISOString().split('T')[0];
        
        // State
        let currentAgent = 'main';
        let agents = ['main', 'assistant', 'coding'];
        let selectedDate = today;
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let allMemories = [];
        let dateCounts = {};
        let allEntities = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderAgentButtons();
            loadMemories();
            loadEntities();
        });
        
        // Render Agent Buttons
        function renderAgentButtons() {
            const container = document.getElementById('agent-buttons');
            container.innerHTML = agents.map(agent => `
                <button class="agent-btn ${agent === currentAgent ? 'active' : ''}" 
                        onclick="switchAgent('${agent}')">${agent}</button>
            `).join('');
        }
        
        // Switch Agent
        function switchAgent(agent) {
            currentAgent = agent;
            selectedDate = today;
            renderAgentButtons();
            loadMemories();
            loadEntities();
            document.getElementById('current-agent-name').textContent = agent;
        }
        
        // Add New Agent
        function addAgent() {
            const name = prompt('输入新 Agent 名称:');
            if (name && !agents.includes(name)) {
                agents.push(name);
                switchAgent(name);
            }
        }
        
        // Load Memories
        async function loadMemories() {
            try {
                const resp = await fetch(`${API}/memories?limit=500&agent=${currentAgent}`);
                const data = await resp.json();
                allMemories = data.memories || [];
                
                // Calculate date counts
                dateCounts = {};
                allMemories.forEach(m => {
                    const date = (m.date || '').split('T')[0];
                    if (date) dateCounts[date] = (dateCounts[date] || 0) + 1;
                });
                
                // Update stats
                document.getElementById('stat-total').textContent = allMemories.length;
                
                // Render
                renderCalendar();
                renderDateList();
                selectDate(selectedDate);
            } catch (e) {
                console.error('加载失败:', e);
            }
        }
        
        // Load Entities
        async function loadEntities() {
            try {
                const resp = await fetch(`${API}/entities?agent=${currentAgent}`);
                const data = await resp.json();
                allEntities = data.entities || [];
                
                document.getElementById('stat-entities').textContent = allEntities.length;
                renderEntities(allEntities);
            } catch (e) {
                console.error('加载实体失败:', e);
                document.getElementById('entity-list').innerHTML = '<div class="empty">加载失败</div>';
            }
        }
        
        // Render Calendar
        function renderCalendar() {
            const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            
            document.getElementById('calendar-month').textContent = `${currentYear}年${months[currentMonth]}`;
            
            const grid = document.getElementById('calendar-grid');
            let html = weekDays.map(d => `<div class="calendar-day-header">${d}</div>`).join('');
            
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startDay = firstDay.getDay();
            
            // Previous month
            const prevLast = new Date(currentYear, currentMonth, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${prevLast - i}</div>`;
            }
            
            // Current month
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasMem = dateCounts[dateStr] > 0;
                const isToday = dateStr === today;
                const isSelected = dateStr === selectedDate;
                
                let classes = 'calendar-day';
                if (hasMem) classes += ' has-memory';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                
                html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${day}</div>`;
            }
            
            // Next month
            const endDay = lastDay.getDay();
            for (let i = 1; i < 7 - endDay; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }
            
            grid.innerHTML = html;
        }
        
        // Render Date List
        function renderDateList() {
            const container = document.getElementById('date-list');
            const dates = Object.keys(dateCounts).sort((a, b) => b.localeCompare(a));
            
            if (!dates.length) {
                container.innerHTML = '<div class="empty" style="padding: 16px;">暂无记忆</div>';
                return;
            }
            
            container.innerHTML = dates.map(date => `
                <div class="date-item ${date === selectedDate ? 'active' : ''}" onclick="selectDate('${date}')">
                    <span>${formatDate(date)}</span>
                    <span style="color:#888">${dateCounts[date]}</span>
                </div>
            `).join('');
        }
        
        // Select Date
        function selectDate(date) {
            selectedDate = date;
            renderCalendar();
            renderDateList();
            
            document.getElementById('date-header').style.display = 'block';
            document.getElementById('current-date-val').textContent = formatDate(date);
            document.getElementById('current-date-count').textContent = `${dateCounts[date] || 0} 条记忆`;
            
            const memories = allMemories.filter(m => (m.date || '').startsWith(date));
            renderMemories(memories);
        }
        
        // Render Memories
        function renderMemories(memories) {
            const container = document.getElementById('memory-list');
            
            if (!memories.length) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当天暂无记忆</div>';
                return;
            }
            
            container.innerHTML = memories.map(m => `
                <div class="memory-item ${m.type}">
                    <div class="memory-content">${escapeHtml(m.content)}</div>
                    <div class="memory-meta">
                        <span class="type-badge ${m.type}">${getTypeLabel(m.type)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Render Entities
        function renderEntities(entities) {
            const container = document.getElementById('entity-list');
            
            if (!entities.length) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">🔗</div>暂无实体</div>';
                return;
            }
            
            const icons = {tool: '🔧', project: '📦', concept: '💡', person: '👤'};
            
            container.innerHTML = entities.map(e => `
                <div class="entity-item" onclick="showEntityDetail('${escapeHtml(e.name)}', '${e.entityType}')">
                    <div class="entity-icon ${e.entityType}">${icons[e.entityType] || '📌'}</div>
                    <div style="flex:1">
                        <div class="entity-name">${escapeHtml(e.name)}</div>
                        <div class="entity-meta">${e.entityType} · ${e.mentionCount || 1}次</div>
                    </div>
                </div>
            `).join('');
            
            // 渲染词云图
            renderWordCloud(entities);
        }
        
        // Render Word Cloud
        function renderWordCloud(entities) {
            const container = document.getElementById('word-cloud');
            if (!entities.length) {
                container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666">暂无数据</div>';
                return;
            }
            
            const width = container.offsetWidth || 240;
            const height = container.offsetHeight || 180;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 按提及次数排序
            const sorted = [...entities].sort((a, b) => (b.mentionCount || 1) - (a.mentionCount || 1));
            const maxCount = Math.max(...sorted.map(e => e.mentionCount || 1));
            
            // 计算字体大小
            const minFont = 10;
            const maxFont = 24;
            
            // 螺旋布局
            const positions = [];
            let angle = 0;
            let radius = 0;
            
            sorted.forEach((entity, i) => {
                const count = entity.mentionCount || 1;
                const fontSize = minFont + (maxFont - minFont) * (count / maxCount);
                const wordWidth = entity.name.length * fontSize * 0.6;
                const wordHeight = fontSize;
                
                // 螺旋排列
                let x, y, attempts = 0;
                const maxAttempts = 100;
                
                do {
                    x = centerX + radius * Math.cos(angle) - wordWidth / 2;
                    y = centerY + radius * Math.sin(angle) - wordHeight / 2;
                    angle += 0.5;
                    radius += 0.3;
                    attempts++;
                } while (attempts < maxAttempts && (x < 5 || x + wordWidth > width - 5 || y < 5 || y + wordHeight > height - 5));
                
                // 边界检查
                x = Math.max(5, Math.min(width - wordWidth - 5, x));
                y = Math.max(5, Math.min(height - wordHeight - 5, y));
                
                positions.push({
                    entity,
                    x,
                    y,
                    fontSize,
                    color: getEntityColor(entity.entityType)
                });
            });
            
            // 渲染词云
            container.innerHTML = positions.map((p, i) => `
                <div class="word-item word-${p.entity.entityType}" 
                     style="left:${p.x}px;top:${p.y}px;font-size:${p.fontSize}px;color:${p.color};animation:fadeIn 0.3s ease ${i * 0.05}s both"
                     onclick="showEntityDetail('${escapeHtml(p.entity.name)}', '${p.entity.entityType}')"
                     title="${p.entity.name} (${p.entity.entityType}) - ${p.entity.mentionCount || 1}次">
                    ${escapeHtml(p.entity.name)}
                </div>
            `).join('');
        }
        
        // Get Entity Color
        function getEntityColor(type) {
            const colors = {
                tool: '#4fc3f7',
                project: '#81c784',
                concept: '#ce93d8',
                person: '#ffb74d'
            };
            return colors[type] || '#e0e0e0';
        }
        
        // Show Entity Detail
        function showEntityDetail(name, type) {
            document.getElementById('entity-detail').style.display = 'block';
            document.getElementById('entity-detail-title').textContent = name;
            
            // 搜索相关记忆
            const related = allMemories.filter(m => 
                (m.content || '').toLowerCase().includes(name.toLowerCase())
            ).slice(0, 5);
            
            const relationsHTML = related.length 
                ? related.map(m => `
                    <div class="relation-item">
                        <span>→</span>
                        <span style="color:#4fc3f7;cursor:pointer" onclick="searchMemories('${name}')">${(m.content || '').substring(0, 30)}...</span>
                    </div>
                `).join('')
                : '<div class="relation-item" style="color:#888">暂无关联记忆</div>';
            
            document.getElementById('entity-relations').innerHTML = relationsHTML;
        }
        
        // Search
        async function searchMemories(query) {
            if (!query) query = document.getElementById('search-input').value.trim();
            if (!query) { selectDate(selectedDate); return; }
            
            try {
                const resp = await fetch(`${API}/memories/search`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query, agent_id: currentAgent, limit: 30})
                });
                const data = await resp.json();
                
                document.getElementById('date-header').style.display = 'none';
                renderMemories(data.results || []);
            } catch (e) {
                console.error(e);
            }
        }
        
        // Search Entities
        async function searchEntities() {
            const q = document.getElementById('entity-search').value.trim();
            if (!q) { renderEntities(allEntities); return; }
            
            const filtered = allEntities.filter(e => 
                (e.name || '').toLowerCase().includes(q.toLowerCase())
            );
            renderEntities(filtered);
        }
        
        // Add Memory
        async function addMemory() {
            const content = document.getElementById('new-memory').value.trim();
            if (!content) return;
            
            try {
                const resp = await fetch(`${API}/memories`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content,
                        type: document.getElementById('mem-type').value,
                        importance: parseFloat(document.getElementById('mem-imp').value) || 0.5,
                        agent_id: currentAgent
                    })
                });
                
                if (resp.ok) {
                    document.getElementById('new-memory').value = '';
                    loadMemories();
                    loadEntities();
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // Calendar Navigation
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }
        
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }
        
        // Helpers
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${dateStr} ${weekdays[d.getDay()]}`;
        }
        
        function getTypeLabel(t) {
            return {decision: '决策', event: '事件', context: '上下文', learning: '学习'}[t] || t;
        }
        
        function escapeHtml(t) {
            if (!t) return '';
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }
    </script>
</body>
</html>
