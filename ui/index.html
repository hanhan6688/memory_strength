<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Enhanced Memory System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(255,255,255,0.05);
            border-radius: 12px; margin-bottom: 16px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; gap: 16px; font-size: 13px; }
        .user-badge, .agent-badge { 
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 6px;
        }
        .user-badge strong { color: #81c784; }
        .agent-badge strong { color: #4fc3f7; }
        .stats { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #4fc3f7; }
        .stat-label { font-size: 11px; color: #888; }
        
        /* Main Layout */
        .main-layout { display: grid; grid-template-columns: 260px 1fr 280px; gap: 16px; height: calc(100vh - 140px); }
        
        /* Panel */
        .panel {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column;
        }
        .panel-header {
            padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        
        /* Date List */
        .date-list { flex: 1; overflow-y: auto; padding: 8px; }
        .date-list::-webkit-scrollbar { width: 4px; }
        .date-list::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.3); border-radius: 2px; }
        
        .date-item {
            padding: 12px 14px; border-radius: 8px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .date-item:hover { background: rgba(255,255,255,0.08); }
        .date-item.active { 
            background: linear-gradient(135deg, rgba(79,195,247,0.2), rgba(129,199,132,0.2));
            border-left: 3px solid #4fc3f7;
        }
        .date-label { font-size: 14px; font-weight: 500; }
        .date-count { 
            font-size: 11px; background: rgba(79,195,247,0.2); 
            padding: 2px 8px; border-radius: 10px; color: #4fc3f7;
        }
        .date-item.today .date-label { color: #81c784; }
        .date-item.today .date-label::after { content: ' (今天)'; font-size: 11px; }
        
        /* Memory List */
        .memory-list { flex: 1; overflow-y: auto; padding: 12px; }
        .memory-list::-webkit-scrollbar { width: 4px; }
        .memory-list::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.3); border-radius: 2px; }
        
        .memory-item {
            background: rgba(255,255,255,0.02); border-radius: 10px;
            padding: 14px 16px; margin-bottom: 8px;
            border-left: 3px solid #4fc3f7;
            transition: all 0.2s;
        }
        .memory-item:hover { background: rgba(255,255,255,0.05); }
        .memory-item.decision { border-left-color: #ce93d8; }
        .memory-item.event { border-left-color: #81c784; }
        .memory-item.learning { border-left-color: #ffb74d; }
        
        .memory-content { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
        .memory-meta { display: flex; gap: 10px; font-size: 11px; color: #888; }
        .type-badge {
            padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .type-badge.decision { background: rgba(206,147,216,0.2); color: #ce93d8; }
        .type-badge.event { background: rgba(129,199,132,0.2); color: #81c784; }
        .type-badge.context { background: rgba(79,195,247,0.2); color: #4fc3f7; }
        .type-badge.learning { background: rgba(255,183,77,0.2); color: #ffb74d; }
        
        /* Search */
        .search-box { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .search-box input {
            width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 13px;
        }
        .search-box input:focus { outline: none; border-color: #4fc3f7; }
        
        /* Time Query */
        .time-query { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .time-query input { width: 100%; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; background: rgba(255,255,255,0.05); color: #fff; font-size: 12px; }
        .time-query-hint { font-size: 10px; color: #666; margin-top: 4px; }
        
        /* Add Memory */
        .add-memory { padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
        .add-memory textarea {
            width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 13px; resize: none; height: 60px;
        }
        .add-memory textarea:focus { outline: none; border-color: #4fc3f7; }
        .add-row { display: flex; gap: 8px; margin-top: 8px; }
        .add-row select, .add-row input {
            flex: 1; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 12px;
        }
        .add-row select option { background: #1a1a2e; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 12px; font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary { background: #4fc3f7; color: #1a1a2e; }
        .btn-primary:hover { background: #29b6f6; }
        
        /* Empty State */
        .empty { text-align: center; padding: 40px 20px; color: #666; }
        .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.5; }
        
        /* Entity List */
        .entity-list { flex: 1; overflow-y: auto; padding: 12px; }
        .entity-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; background: rgba(255,255,255,0.02);
            border-radius: 8px; margin-bottom: 6px;
        }
        .entity-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            background: rgba(79,195,247,0.2);
        }
        .entity-name { font-size: 13px; font-weight: 500; }
        .entity-meta { font-size: 10px; color: #888; }
        
        /* Current Date Display */
        .current-date {
            padding: 10px 14px; background: rgba(79,195,247,0.1);
            border-radius: 8px; margin: 8px; text-align: center;
        }
        .current-date-value { font-size: 18px; font-weight: 600; color: #4fc3f7; }
        .current-date-count { font-size: 11px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Enhanced Memory</h1>
            <div class="user-info">
                <span class="user-badge">👤 用户: <strong id="user-id">default</strong></span>
                <span class="agent-badge">🤖 Agent: <strong id="agent-id">main</strong></span>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-mem">0</div>
                    <div class="stat-label">长期记忆</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-dates">0</div>
                    <div class="stat-label">日期</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-entities">0</div>
                    <div class="stat-label">实体</div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left: Date List -->
            <div class="panel">
                <div class="panel-header">📅 日期导航</div>
                <div class="time-query">
                    <input type="text" id="time-query" placeholder="时间查询: 上个月/昨天...">
                    <div class="time-query-hint">支持: 今天、昨天、上周、上个月、最近N天</div>
                </div>
                <div class="date-list" id="date-list">
                    <div class="empty"><div class="empty-icon">📅</div>加载中...</div>
                </div>
            </div>

            <!-- Center: Memory List -->
            <div class="panel">
                <div class="panel-header">
                    <span id="mem-header">📝 记忆列表</span>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索记忆 (语义搜索)..." onkeypress="if(event.key==='Enter')searchMemories()">
                </div>
                <div class="current-date" id="current-date-box" style="display:none">
                    <div class="current-date-value" id="current-date-val"></div>
                    <div class="current-date-count" id="current-date-count"></div>
                </div>
                <div class="memory-list" id="memory-list">
                    <div class="empty"><div class="empty-icon">🧠</div>选择日期查看记忆</div>
                </div>
                <div class="add-memory">
                    <textarea id="new-memory" placeholder="添加新记忆..."></textarea>
                    <div class="add-row">
                        <select id="mem-type">
                            <option value="context">💡 上下文</option>
                            <option value="event">📅 事件</option>
                            <option value="decision">🎯 决策</option>
                            <option value="learning">📚 学习</option>
                        </select>
                        <input type="number" id="mem-imp" value="0.5" min="0" max="1" step="0.1" placeholder="重要性">
                        <button class="btn btn-primary" onclick="addMemory()">添加</button>
                    </div>
                </div>
            </div>

            <!-- Right: Entities -->
            <div class="panel">
                <div class="panel-header">🔗 知识图谱</div>
                <div class="search-box">
                    <input type="text" id="entity-search" placeholder="搜索实体..." onkeypress="if(event.key==='Enter')searchEntities()">
                </div>
                <div class="entity-list" id="entity-list">
                    <div class="empty"><div class="empty-icon">🔗</div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let allMemories = [];
        let allDates = {};
        let selectedDate = null;
        const today = new Date().toISOString().split('T')[0];
        
        // 当前用户和 Agent（从 URL 参数或默认值）
        const urlParams = new URLSearchParams(window.location.search);
        const currentUser = urlParams.get('user') || 'default';
        const currentAgent = urlParams.get('agent') || 'main';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 显示用户信息
            document.getElementById('user-id').textContent = currentUser;
            document.getElementById('agent-id').textContent = currentAgent;
            
            loadAllMemories();
            loadEntities();
            
            // 时间查询回车事件
            document.getElementById('time-query').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') timeQuery();
            });
        });

        // 加载所有记忆并按日期分组
        async function loadAllMemories() {
            try {
                const resp = await fetch(`${API}/memories?limit=500`);
                const data = await resp.json();
                allMemories = data.memories || [];
                
                // 按日期分组
                allDates = {};
                allMemories.forEach(m => {
                    const date = (m.date || '').split('T')[0] || 'unknown';
                    if (!allDates[date]) allDates[date] = [];
                    allDates[date].push(m);
                });
                
                // 更新统计
                document.getElementById('total-mem').textContent = allMemories.length;
                document.getElementById('total-dates').textContent = Object.keys(allDates).length;
                
                // 渲染日期列表
                renderDateList();
                
                // 默认显示今天的记忆
                if (allDates[today]) {
                    selectDate(today);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('date-list').innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        // 渲染日期列表
        function renderDateList() {
            const container = document.getElementById('date-list');
            const dates = Object.keys(allDates).sort((a, b) => b.localeCompare(a));
            
            if (!dates.length) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无记忆</div>';
                return;
            }
            
            container.innerHTML = dates.map(date => {
                const count = allDates[date].length;
                const isToday = date === today;
                const displayDate = formatDate(date);
                
                return `
                    <div class="date-item ${isToday ? 'today' : ''} ${selectedDate === date ? 'active' : ''}" 
                         onclick="selectDate('${date}')">
                        <span class="date-label">${displayDate}</span>
                        <span class="date-count">${count}</span>
                    </div>
                `;
            }).join('');
        }

        // 选择日期
        function selectDate(date) {
            selectedDate = date;
            
            // 更新日期列表高亮
            document.querySelectorAll('.date-item').forEach(el => {
                el.classList.remove('active');
                if (el.getAttribute('onclick').includes(date)) {
                    el.classList.add('active');
                }
            });
            
            // 显示当前日期
            const dateBox = document.getElementById('current-date-box');
            dateBox.style.display = 'block';
            document.getElementById('current-date-val').textContent = formatDate(date);
            document.getElementById('current-date-count').textContent = `${allDates[date]?.length || 0} 条记忆`;
            
            // 渲染记忆
            renderMemories(allDates[date] || []);
        }

        // 渲染记忆列表
        function renderMemories(memories) {
            const container = document.getElementById('memory-list');
            
            if (!memories.length) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无记忆</div>';
                return;
            }
            
            container.innerHTML = memories.map(m => `
                <div class="memory-item ${m.type}">
                    <div class="memory-content">${escapeHtml(m.content)}</div>
                    <div class="memory-meta">
                        <span class="type-badge ${m.type}">${getTypeLabel(m.type)}</span>
                        <span>${(m.date || '').split('T')[0]}</span>
                        ${m.importance ? `<span>重要: ${m.importance}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 时间范围查询
        async function timeQuery() {
            const expr = document.getElementById('time-query').value.trim();
            if (!expr) {
                renderDateList();
                return;
            }
            
            try {
                const resp = await fetch(`${API}/memories/time-query`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({time_expression: expr})
                });
                const data = await resp.json();
                
                if (data.time_range) {
                    document.getElementById('mem-header').textContent = `📝 ${data.time_range}`;
                }
                
                renderMemories(data.memories || []);
            } catch (e) {
                console.error(e);
            }
        }

        // 语义搜索
        async function searchMemories() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) {
                if (selectedDate) {
                    renderMemories(allDates[selectedDate] || []);
                }
                return;
            }
            
            try {
                const resp = await fetch(`${API}/memories/search`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q, limit: 30})
                });
                const data = await resp.json();
                
                document.getElementById('mem-header').textContent = `📝 搜索: "${q}"`;
                document.getElementById('current-date-box').style.display = 'none';
                renderMemories(data.results || []);
            } catch (e) {
                console.error(e);
            }
        }

        // 添加记忆
        async function addMemory() {
            const content = document.getElementById('new-memory').value.trim();
            if (!content) return;
            
            try {
                const resp = await fetch(`${API}/memories`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content,
                        type: document.getElementById('mem-type').value,
                        importance: parseFloat(document.getElementById('mem-imp').value) || 0.5
                    })
                });
                
                if (resp.ok) {
                    document.getElementById('new-memory').value = '';
                    loadAllMemories(); // 刷新
                }
            } catch (e) {
                console.error(e);
            }
        }

        // 加载实体
        async function loadEntities() {
            try {
                const resp = await fetch(`${API}/entities`);
                const data = await resp.json();
                const entities = data.entities || [];
                
                document.getElementById('total-entities').textContent = entities.length;
                renderEntities(entities);
            } catch (e) {
                document.getElementById('entity-list').innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        // 渲染实体
        function renderEntities(entities) {
            const container = document.getElementById('entity-list');
            
            if (!entities.length) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">🔗</div>暂无实体</div>';
                return;
            }
            
            const icons = {project: '📦', tool: '🔧', concept: '💡', person: '👤', location: '📍'};
            
            container.innerHTML = entities.slice(0, 20).map(e => `
                <div class="entity-item">
                    <div class="entity-icon">${icons[e.entityType] || '📌'}</div>
                    <div>
                        <div class="entity-name">${escapeHtml(e.name)}</div>
                        <div class="entity-meta">${e.entityType} · ${e.mentionCount || 1}次</div>
                    </div>
                </div>
            `).join('');
        }

        // 搜索实体
        async function searchEntities() {
            const q = document.getElementById('entity-search').value.trim();
            if (!q) {
                loadEntities();
                return;
            }
            
            const resp = await fetch(`${API}/entities/search`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: q, limit: 20})
            });
            const data = await resp.json();
            renderEntities(data.results || []);
        }

        // 辅助函数
        function formatDate(dateStr) {
            if (dateStr === 'unknown') return '未知日期';
            const d = new Date(dateStr);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return `${dateStr} ${weekdays[d.getDay()]}`;
        }

        function getTypeLabel(t) {
            const labels = {decision: '决策', event: '事件', context: '上下文', learning: '学习'};
            return labels[t] || t;
        }

        function escapeHtml(t) {
            if (!t) return '';
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }
    </script>
</body>
</html>
