<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Enhanced Memory System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: rgba(255,255,255,0.05);
            border-radius: 16px; margin-bottom: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 28px; display: flex; align-items: center; gap: 12px; }
        .stats-row { display: flex; gap: 15px; }
        .stat-card {
            background: linear-gradient(135deg, rgba(79,195,247,0.2), rgba(129,199,132,0.2));
            padding: 15px 25px; border-radius: 12px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); min-width: 100px;
            transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stat-value { font-size: 32px; font-weight: bold; background: linear-gradient(45deg, #4fc3f7, #81c784); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        
        /* Tabs Navigation */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tab {
            padding: 12px 24px; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 500;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .nav-tab:hover { background: rgba(255,255,255,0.1); }
        .nav-tab.active { background: linear-gradient(135deg, #4fc3f7, #29b6f6); color: #1a1a2e; border-color: transparent; }
        
        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 280px 1fr 320px; gap: 20px; }
        
        /* Panel */
        .panel {
            background: rgba(255,255,255,0.03); border-radius: 16px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .panel-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Date Navigation */
        .date-nav { margin-bottom: 16px; }
        .date-picker-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .date-picker-row input {
            flex: 1; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 13px;
        }
        .quick-dates { display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-date {
            padding: 6px 12px; border-radius: 16px; font-size: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.3s;
        }
        .quick-date:hover, .quick-date.active { background: rgba(79,195,247,0.2); border-color: #4fc3f7; }
        
        /* Calendar */
        .calendar { margin-top: 10px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-nav { cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.3s; }
        .calendar-nav:hover { background: rgba(255,255,255,0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day {
            text-align: center; padding: 8px 4px; font-size: 12px;
            border-radius: 6px; cursor: pointer; transition: all 0.3s;
        }
        .calendar-day:hover { background: rgba(255,255,255,0.1); }
        .calendar-day.today { background: rgba(79,195,247,0.3); color: #fff; }
        .calendar-day.has-memory { background: rgba(129,199,132,0.2); }
        .calendar-day.selected { background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
        .calendar-day.other-month { color: #555; }
        
        /* Search */
        .search-box { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-box input {
            flex: 1; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 14px; transition: border-color 0.3s;
        }
        .search-box input:focus { outline: none; border-color: #4fc3f7; box-shadow: 0 0 15px rgba(79,195,247,0.3); }
        .btn {
            padding: 12px 20px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #4fc3f7, #29b6f6); color: #1a1a2e; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(79,195,247,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        
        /* Time Range Query */
        .time-query-box { margin-bottom: 16px; padding: 12px; background: rgba(79,195,247,0.1); border-radius: 10px; }
        .time-query-box input { background: rgba(255,255,255,0.1); }
        .time-query-hint { font-size: 11px; color: #888; margin-top: 6px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab {
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            font-size: 13px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .tab:hover { background: rgba(255,255,255,0.1); }
        .tab.active { background: linear-gradient(135deg, #4fc3f7, #29b6f6); color: #1a1a2e; border-color: transparent; }
        
        /* Memory List */
        .memory-list { max-height: calc(100vh - 400px); overflow-y: auto; padding-right: 5px; }
        .memory-list::-webkit-scrollbar { width: 6px; }
        .memory-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        .memory-list::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.3); border-radius: 3px; }
        
        .memory-item {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            padding: 14px 16px; margin-bottom: 10px;
            border-left: 4px solid #4fc3f7;
            transition: all 0.3s; cursor: pointer;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .memory-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .memory-item.decision { border-left-color: #ce93d8; }
        .memory-item.event { border-left-color: #81c784; }
        .memory-item.learning { border-left-color: #ffb74d; }
        
        .memory-content { font-size: 14px; line-height: 1.5; margin-bottom: 8px; color: #e0e0e0; }
        .memory-meta { display: flex; gap: 10px; align-items: center; font-size: 11px; color: #888; }
        .type-badge {
            font-size: 10px; padding: 3px 10px; border-radius: 12px;
            text-transform: uppercase; font-weight: 600;
        }
        .type-badge.decision { background: rgba(206,147,216,0.2); color: #ce93d8; }
        .type-badge.event { background: rgba(129,199,132,0.2); color: #81c784; }
        .type-badge.context { background: rgba(79,195,247,0.2); color: #4fc3f7; }
        .type-badge.learning { background: rgba(255,183,77,0.2); color: #ffb74d; }
        
        /* Timeline */
        .timeline-date {
            font-size: 13px; font-weight: 600; color: #4fc3f7;
            margin: 16px 0 8px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        .timeline-date:hover { color: #81c784; }
        .timeline-count { font-size: 11px; color: #888; }
        .timeline-item {
            padding: 10px 12px; margin-bottom: 6px;
            background: rgba(255,255,255,0.02); border-radius: 8px;
            font-size: 12px; transition: all 0.3s; cursor: pointer;
            border-left: 3px solid transparent;
        }
        .timeline-item:hover { background: rgba(255,255,255,0.06); border-left-color: #4fc3f7; }
        
        /* Entity Card */
        .entity-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; background: rgba(255,255,255,0.03);
            border-radius: 12px; margin-bottom: 10px;
            transition: all 0.3s; cursor: pointer;
        }
        .entity-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .entity-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .entity-icon.project { background: linear-gradient(135deg, rgba(129,199,132,0.3), rgba(102,187,106,0.3)); }
        .entity-icon.tool { background: linear-gradient(135deg, rgba(79,195,247,0.3), rgba(41,182,246,0.3)); }
        .entity-icon.concept { background: linear-gradient(135deg, rgba(206,147,216,0.3), rgba(186,104,200,0.3)); }
        .entity-info { flex: 1; }
        .entity-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .entity-type { font-size: 11px; color: #888; }
        
        /* Charts */
        .chart-container { padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 15px; }
        .chart-title { font-size: 13px; color: #888; margin-bottom: 10px; }
        
        /* Empty State */
        .empty { text-align: center; padding: 40px 20px; color: #666; }
        .empty-icon { font-size: 48px; margin-bottom: 10px; opacity: 0.5; }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(79,195,247,0.3); border-top-color: #4fc3f7; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Enhanced Memory</h1>
            <div class="stats-row" id="stats-row">
                <div class="stat-card" onclick="showAll()">
                    <div class="stat-value" id="stat-mem">-</div>
                    <div class="stat-label">总记忆</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-ent">-</div>
                    <div class="stat-label">实体</div>
                </div>
                <div class="stat-card" onclick="filterByDate(today())">
                    <div class="stat-value" id="stat-today">-</div>
                    <div class="stat-label">今日</div>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('memories')">🔍 记忆检索</div>
            <div class="nav-tab" onclick="switchTab('timeline')">📅 时间线</div>
            <div class="nav-tab" onclick="switchTab('graph')">🕸️ 知识图谱</div>
            <div class="nav-tab" onclick="switchTab('timequery')">⏰ 时间查询</div>
        </div>

        <div class="main-grid" id="main-content">
            <!-- Left: Calendar + Stats -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📅 日期导航</div>
                </div>
                
                <!-- Calendar -->
                <div class="calendar">
                    <div class="calendar-header">
                        <span class="calendar-nav" onclick="prevMonth()">◀</span>
                        <span id="calendar-month">2026年3月</span>
                        <span class="calendar-nav" onclick="nextMonth()">▶</span>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                
                <!-- Quick Dates -->
                <div class="date-nav" style="margin-top: 16px;">
                    <div class="panel-title" style="margin-bottom: 10px;">快捷选择</div>
                    <div class="quick-dates">
                        <div class="quick-date" onclick="filterByDate(today())">今天</div>
                        <div class="quick-date" onclick="filterByDate(yesterday())">昨天</div>
                        <div class="quick-date" onclick="filterByRange('week')">本周</div>
                        <div class="quick-date" onclick="filterByRange('month')">本月</div>
                        <div class="quick-date" onclick="filterByRange('last7')">最近7天</div>
                        <div class="quick-date" onclick="filterByRange('last30')">最近30天</div>
                    </div>
                </div>
                
                <!-- Chart -->
                <div class="chart-container" style="margin-top: 16px;">
                    <div class="chart-title">类型分布</div>
                    <canvas id="typeChart" height="120"></canvas>
                </div>
            </div>

            <!-- Center: Memory Search -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔍 记忆检索</div>
                    <span id="current-filter" style="font-size: 12px; color: #888;"></span>
                </div>
                
                <!-- Search -->
                <div class="search-box">
                    <input type="text" id="q" placeholder="搜索记忆... (支持语义搜索)" onkeypress="if(event.key==='Enter')search()">
                    <button class="btn btn-primary" onclick="search()">搜索</button>
                </div>
                
                <!-- Time Range Query -->
                <div class="time-query-box">
                    <div class="search-box" style="margin-bottom: 0;">
                        <input type="text" id="time-q" placeholder="时间范围查询: 上个月 / 昨天 / 最近7天...">
                        <button class="btn btn-secondary" onclick="timeSearch()">查询</button>
                    </div>
                    <div class="time-query-hint">支持: 今天、昨天、上周、上个月、最近N天、YYYY-MM-DD</div>
                </div>
                
                <!-- Type Filter -->
                <div class="tabs">
                    <div class="tab active" onclick="filter('all')">全部</div>
                    <div class="tab" onclick="filter('decision')">🎯 决策</div>
                    <div class="tab" onclick="filter('event')">📅 事件</div>
                    <div class="tab" onclick="filter('context')">💡 上下文</div>
                    <div class="tab" onclick="filter('learning')">📚 学习</div>
                </div>
                
                <!-- Results -->
                <div class="memory-list" id="memories"><div class="loading"><div class="spinner"></div></div></div>
            </div>

            <!-- Right: Entities -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🔗 知识图谱</div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="eq" placeholder="搜索实体..." onkeypress="if(event.key==='Enter')searchEnt()">
                    <button class="btn btn-secondary" onclick="searchEnt()">搜索</button>
                </div>
                
                <div class="memory-list" id="entities"><div class="loading"><div class="spinner"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let allMem = [], filterType = 'all', typeChart = null;
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = null;
        let memoryDates = {};

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadMemories();
            loadEntities();
            renderCalendar();
        });

        // 日期辅助函数
        function today() { return new Date().toISOString().split('T')[0]; }
        function yesterday() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        }

        // 加载统计
        async function loadStats() {
            try {
                const resp = await fetch(`${API}/stats`);
                const data = await resp.json();
                document.getElementById('stat-mem').textContent = data.total_memories || 0;
                document.getElementById('stat-ent').textContent = data.total_entities || 0;
                document.getElementById('stat-today').textContent = data.by_date?.[today()] || 0;
                
                memoryDates = data.by_date || {};
                renderTypeChart(data.by_type || {});
                renderCalendar();
            } catch (e) { console.error(e); }
        }

        // 渲染日历
        function renderCalendar() {
            const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            document.getElementById('calendar-month').textContent = `${currentYear}年${monthNames[currentMonth]}`;
            
            const grid = document.getElementById('calendar-grid');
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            
            let html = '';
            
            // 星期标题
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(d => {
                html += `<div class="calendar-day" style="color: #888; cursor: default;">${d}</div>`;
            });
            
            // 上月的日期
            const startDay = firstDay.getDay();
            const prevMonth = new Date(currentYear, currentMonth, 0);
            for (let i = startDay - 1; i >= 0; i--) {
                const day = prevMonth.getDate() - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            // 当月日期
            const todayStr = today();
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasMemory = memoryDates[dateStr] > 0;
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDate;
                
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasMemory) classes += ' has-memory';
                if (isSelected) classes += ' selected';
                
                const count = memoryDates[dateStr] || 0;
                const tooltip = hasMemory ? ` title="${count} 条记忆"` : '';
                
                html += `<div class="${classes}" onclick="filterByDate('${dateStr}')"${tooltip}>${day}${hasMemory ? '<span style="font-size:8px;color:#81c784">●</span>' : ''}</div>`;
            }
            
            // 下月的日期
            const endDay = lastDay.getDay();
            for (let day = 1; day < 7 - endDay; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            grid.innerHTML = html;
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        // 按日期筛选
        function filterByDate(dateStr) {
            selectedDate = dateStr;
            document.getElementById('current-filter').textContent = `筛选: ${dateStr}`;
            renderCalendar();
            
            const filtered = allMem.filter(m => (m.date || '').startsWith(dateStr));
            renderMem(filtered);
        }

        // 按时间范围筛选
        function filterByRange(range) {
            const now = new Date();
            let start, end = now;
            
            switch(range) {
                case 'week':
                    start = new Date(now);
                    start.setDate(start.getDate() - start.getDay());
                    break;
                case 'month':
                    start = new Date(now.getFullYear(), now.getMonth(), 1);
                    break;
                case 'last7':
                    start = new Date(now);
                    start.setDate(start.getDate() - 7);
                    break;
                case 'last30':
                    start = new Date(now);
                    start.setDate(start.getDate() - 30);
                    break;
            }
            
            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            document.getElementById('current-filter').textContent = `筛选: ${startStr} ~ ${endStr}`;
            
            const filtered = allMem.filter(m => {
                const d = (m.date || '').split('T')[0];
                return d >= startStr && d <= endStr;
            });
            renderMem(filtered);
        }

        // 显示全部
        function showAll() {
            selectedDate = null;
            document.getElementById('current-filter').textContent = '';
            renderCalendar();
            renderMem(allMem);
        }

        // 类型分布图表
        function renderTypeChart(byType) {
            const ctx = document.getElementById('typeChart').getContext('2d');
            const labels = { decision: '决策', event: '事件', context: '上下文', learning: '学习' };
            const colors = { decision: '#ce93d8', event: '#81c784', context: '#4fc3f7', learning: '#ffb74d' };
            
            const data = Object.entries(byType).map(([k, v]) => ({
                label: labels[k] || k,
                value: v,
                color: colors[k] || '#888'
            }));
            
            if (typeChart) typeChart.destroy();
            
            typeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.label),
                    datasets: [{
                        data: data.map(d => d.value),
                        backgroundColor: data.map(d => d.color),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 } } } },
                    cutout: '60%'
                }
            });
        }

        // 加载记忆
        async function loadMemories() {
            try {
                const resp = await fetch(`${API}/memories?limit=500`);
                const data = await resp.json();
                allMem = data.memories || [];
                renderMem(allMem);
            } catch (e) { 
                document.getElementById('memories').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>加载失败</div>'; 
            }
        }

        // 渲染记忆
        function renderMem(memories) {
            const c = document.getElementById('memories');
            let list = filterType === 'all' ? memories : memories.filter(m => m.type === filterType);
            
            // 去重
            const seen = new Set();
            list = list.filter(m => {
                const key = m.content?.slice(0, 50);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
            
            if (!list.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>暂无记忆</div>'; return; }
            
            c.innerHTML = list.slice(0, 50).map((m, i) => `
                <div class="memory-item ${m.type}" style="animation-delay: ${i * 0.02}s">
                    <div class="memory-content">${esc(m.content)}</div>
                    <div class="memory-meta">
                        <span class="type-badge ${m.type}">${getTypeLabel(m.type)}</span>
                        <span>${(m.date||'').split('T')[0]}</span>
                    </div>
                </div>
            `).join('');
        }

        // 加载实体
        async function loadEntities() {
            try {
                const resp = await fetch(`${API}/entities`);
                const data = await resp.json();
                renderEnt(data.entities || []);
            } catch (e) { document.getElementById('entities').innerHTML = '<div class="empty">加载失败</div>'; }
        }

        // 渲染实体
        function renderEnt(entities) {
            const c = document.getElementById('entities');
            if (!entities.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">🔗</div>暂无实体</div>'; return; }
            
            const icons = { project: '📦', tool: '🔧', concept: '💡', person: '👤', location: '📍' };
            c.innerHTML = entities.slice(0, 20).map(e => `
                <div class="entity-card">
                    <div class="entity-icon ${e.entityType}">${icons[e.entityType] || '📌'}</div>
                    <div class="entity-info">
                        <div class="entity-name">${esc(e.name)}</div>
                        <div class="entity-type">${e.entityType} · ${e.mentionCount||1}次提及</div>
                    </div>
                </div>
            `).join('');
        }

        // 搜索
        async function search() {
            const q = document.getElementById('q').value.trim();
            if (!q) { renderMem(allMem); return; }
            
            try {
                const resp = await fetch(`${API}/memories/search`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({query: q, limit: 30})
                });
                const data = await resp.json();
                document.getElementById('current-filter').textContent = `搜索: "${q}"`;
                renderMem(data.results || []);
            } catch (e) { console.error(e); }
        }

        // 时间范围查询
        async function timeSearch() {
            const q = document.getElementById('time-q').value.trim();
            if (!q) return;
            
            try {
                const resp = await fetch(`${API}/memories/time-query`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({time_expression: q})
                });
                const data = await resp.json();
                
                if (data.time_range) {
                    document.getElementById('current-filter').textContent = `时间: ${data.time_range}`;
                }
                renderMem(data.memories || []);
            } catch (e) { console.error(e); }
        }

        function filter(t) {
            filterType = t;
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            event.target.classList.add('active');
            renderMem(allMem);
        }

        async function searchEnt() {
            const q = document.getElementById('eq').value.trim();
            if (!q) { loadEntities(); return; }
            
            const resp = await fetch(`${API}/entities/search`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({query: q, limit: 20})
            });
            const data = await resp.json();
            renderEnt(data.results || []);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
            event.target.classList.add('active');
            // TODO: Implement tab switching
        }

        function getTypeLabel(t) {
            const labels = { decision: '决策', event: '事件', context: '上下文', learning: '学习' };
            return labels[t] || t;
        }

        function esc(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
